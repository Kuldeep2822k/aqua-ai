name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Infrastructure Linting
  infrastructure:
    name: Infrastructure Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              **/node_modules/
              **/.pnpm/
            rules:
              line-length: disable
              document-start: disable
              truthy: disable

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: '**/Dockerfile'
          recursive: true
          ignore: DL3008,DL3013,DL3016,DL3018

  # Frontend Tests and Build
  frontend:
    name: Frontend Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint: run normally first (fail on errors), then generate SARIF separately
      - name: Run linter
        if: matrix.node-version == 20
        run: npm run lint

      - name: Generate lint SARIF report
        if: always() && matrix.node-version == 20
        run: |
          npm install --no-save --no-package-lock --ignore-scripts @microsoft/eslint-formatter-sarif@3.1.0
          npx eslint "src/**/*.{ts,tsx}" --format @microsoft/eslint-formatter-sarif --output-file frontend-eslint-results.sarif || true
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: 'true'

      - name: Upload frontend lint results
        if: always() && matrix.node-version == 20
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend/frontend-eslint-results.sarif
          category: eslint-frontend

      - name: Run type check
        if: matrix.node-version == 20
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Upload Frontend Coverage
        if: always() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # Backend Tests
  backend:
    name: Backend Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint: run normally first (fail on errors), then generate SARIF separately
      - name: Run linter
        if: matrix.node-version == 20
        run: npm run lint

      - name: Generate lint SARIF report
        if: always() && matrix.node-version == 20
        run: |
          npm install --no-save --no-package-lock --ignore-scripts @microsoft/eslint-formatter-sarif@3.1.0
          npx eslint . --format @microsoft/eslint-formatter-sarif --output-file backend-eslint-results.sarif || true
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: 'true'

      - name: Upload backend lint results
        if: always() && matrix.node-version == 20
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/backend-eslint-results.sarif
          category: eslint-backend

      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters json-summary text
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Upload Backend Coverage
        if: always() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # Python AI Models Tests
  ai-models:
    name: AI Models & Data Pipeline Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f data-pipeline/requirements.txt ]; then pip install -r data-pipeline/requirements.txt; fi
          pip install flake8 pytest pytest-cov

      - name: Run linter
        run: |
          flake8 ai-models data-pipeline --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        working-directory: ./ai-models
        run: pytest --cov=. --cov-report=xml -v

      - name: Upload AI Models Coverage
        if: always() && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: ai-models-coverage
          path: ai-models/coverage.xml

  # Docker Build Test
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-models]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: aqua-ai-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: aqua-ai-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Models Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ai-models/Dockerfile
          push: false
          tags: aqua-ai-ai-models:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-trivy-db-

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # Coverage Report on PRs
  report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-coverage
        continue-on-error: true

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend-coverage
        continue-on-error: true

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 📊 Test Coverage Report\n\n';
            try {
              const backend = JSON.parse(fs.readFileSync('backend-coverage/coverage-summary.json', 'utf-8'));
              const pct = backend.total;
              body += `### Backend\n| Metric | Coverage |\n|--------|----------|\n`;
              body += `| Statements | ${pct.statements.pct}% |\n`;
              body += `| Branches | ${pct.branches.pct}% |\n`;
              body += `| Functions | ${pct.functions.pct}% |\n`;
              body += `| Lines | ${pct.lines.pct}% |\n\n`;
            } catch { body += '### Backend\n⚠️ No coverage data available\n\n'; }
            try {
              const frontend = JSON.parse(fs.readFileSync('frontend-coverage/coverage-summary.json', 'utf-8'));
              const pct = frontend.total;
              body += `### Frontend\n| Metric | Coverage |\n|--------|----------|\n`;
              body += `| Statements | ${pct.statements.pct}% |\n`;
              body += `| Branches | ${pct.branches.pct}% |\n`;
              body += `| Functions | ${pct.functions.pct}% |\n`;
              body += `| Lines | ${pct.lines.pct}% |\n`;
            } catch { body += '### Frontend\n⚠️ No coverage data available\n'; }
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('## 📊 Test Coverage Report'));
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
