services:
  # PostgreSQL Database with PostGIS
  database:
    image: postgis/postgis:14-3.2@sha256:c94740607edaf0f0fb3f5aaecb6dabd638b859abb5a651b26ee89b5eb58d2cb7
    container_name: aqua-ai-db
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - aqua-ai-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqua-ai-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@database:5432/${DB_NAME:?DB_NAME is required}
      - FRONTEND_URL=http://localhost:3000
    command: ['sh', '-c', 'npm run migrate && npm start']
    depends_on:
      - database
    networks:
      - aqua-ai-network

  # Frontend React Application (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: aqua-ai-frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - aqua-ai-network

  # Python Data Pipeline and AI Models
  ai-pipeline:
    build:
      context: .
      dockerfile: ai-models/Dockerfile
    container_name: aqua-ai-pipeline
    environment:
      - DATABASE_URL=postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@database:5432/${DB_NAME:?DB_NAME is required}
      - DATA_GOV_IN_API_KEY=${DATA_GOV_IN_API_KEY}
      - DATA_GOV_IN_RESOURCE_ID=${DATA_GOV_IN_RESOURCE_ID:-f83158c9-ff64-4ef5-ae8c-c76baf56dae3}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - ALLOW_SAMPLE_DATA=${ALLOW_SAMPLE_DATA:-false}
    depends_on:
      - database
    volumes:
      - ./ai-models:/app/ai-models
      - ./data-pipeline:/app/data-pipeline
      - ai_models_data:/app/models
    networks:
      - aqua-ai-network
    command: ['python', '/app/data-pipeline/fetch_data.py']

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: aqua-ai-redis
    ports:
      - '6379:6379'
    networks:
      - aqua-ai-network

volumes:
  postgres_data:
  ai_models_data:

networks:
  aqua-ai-network:
    driver: bridge
