services:
  # Backend Service
  - type: web
    name: aqua-ai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        fromService:
          type: static
          name: aqua-ai-frontend
          property: url
  # Note: DATABASE_URL and JWT_SECRET must be set in the Render Dashboard

  # Frontend Service (Vite)
  - type: web
    name: aqua-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: aqua-ai-backend
          property: url
